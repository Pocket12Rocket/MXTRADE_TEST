# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Non-secret runtime config
  - variable: PAYFAST_SANDBOX
    value: "true"
    availability:
      - RUNTIME
  - variable: PAYFAST_SKIP_VALIDATION
    value: "false"
    availability:
      - RUNTIME

  # Sensitive Payfast credentials — stored in Cloud Secret Manager.
  # Create each secret by running:
  #   firebase apphosting:secrets:set PAYFAST_MERCHANT_ID
  #   firebase apphosting:secrets:set PAYFAST_MERCHANT_KEY
  #   firebase apphosting:secrets:set PAYFAST_PASSPHRASE
  - variable: PAYFAST_MERCHANT_ID
    secret: PAYFAST_MERCHANT_ID
    availability:
      - RUNTIME
  - variable: PAYFAST_MERCHANT_KEY
    secret: PAYFAST_MERCHANT_KEY
    availability:
      - RUNTIME
  - variable: PAYFAST_PASSPHRASE
    secret: PAYFAST_PASSPHRASE
    availability:
      - RUNTIME
